<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>BeamNG Racing Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="dashboard">

    <!-- Speedometer -->
    <div class="gauge-wrap">
      <canvas id="speedometer" width="280" height="280"></canvas>
      <span class="gauge-unit">km/h</span>
      <div class="air-speed-row">
        <span class="air-speed-label">AIR</span>
        <span id="air-speed-value" class="air-speed-value">0</span>
        <span class="air-speed-unit">km/h</span>
      </div>
    </div>

    <!-- Centre panel: gear, pedals, telemetry, connection status -->
    <div id="center-panel">
      <div id="gear-display">N</div>

      <div class="pedal-row">
        <div class="pedal-group">
          <span class="pedal-label">FUEL</span>
          <div class="bar-track">
            <div id="fuel-bar" class="bar-fill bar-fuel"></div>
          </div>
        </div>
        <div class="pedal-group">
          <span class="pedal-label">THR</span>
          <div class="bar-track">
            <div id="throttle-bar" class="bar-fill bar-throttle"></div>
          </div>
        </div>
        <div class="pedal-group">
          <span class="pedal-label">BRK</span>
          <div class="bar-track">
            <div id="brake-bar" class="bar-fill bar-brake"></div>
          </div>
        </div>
        <div class="pedal-group">
          <span class="pedal-label">CLT</span>
          <div class="bar-track">
            <div id="clutch-bar" class="bar-fill bar-clutch"></div>
          </div>
        </div>
        <div class="pedal-group">
          <span class="pedal-label">PWR</span>
          <div class="bar-track">
            <div id="power-bar" class="bar-fill bar-power"></div>
          </div>
        </div>
      </div>

      <!-- Extra telemetry: turbo & engine temp -->
      <div id="extra-telemetry">
        <div class="telem-item">
          <span class="telem-label">TURBO</span>
          <span id="turbo-value" class="telem-value">0.00</span>
          <span class="telem-unit">bar</span>
        </div>
        <div class="telem-item">
          <span class="telem-label">ENG</span>
          <span id="eng-temp-value" class="telem-value">0</span>
          <span class="telem-unit">°C</span>
        </div>
      </div>

      <div id="connection-status" class="status-connecting">⚡ Connecting…</div>
    </div>

    <!-- Tachometer -->
    <div class="gauge-wrap">
      <canvas id="tachometer" width="280" height="280"></canvas>
      <span class="gauge-unit">RPM ×1000</span>
    </div>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
